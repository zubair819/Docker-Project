events {}

http {
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;

        location /files {
            root /usr/share/nginx/html;
        }
        
        location / {
            return 200 "Nginx is running\n";
        }
        
    }
}